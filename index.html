<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch the Wild Animal! 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#0f2d00;min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
.wrap{width:100%;max-width:680px;user-select:none}

.game-title{text-align:center;font-family:'Fredoka One',cursive;font-size:2rem;
  color:#fff;margin-bottom:1rem}
.game-title span{color:#a8e063}

.instruction{text-align:center;background:rgba(0,0,0,.35);border-radius:14px;
  padding:.7rem 1rem;margin-bottom:.8rem;border:2px solid rgba(168,224,99,.3)}
.catch-text{font-family:'Fredoka One',cursive;font-size:1.7rem;color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,.5);line-height:1.2}
.catch-sub{font-size:.85rem;color:rgba(255,255,255,.75);font-weight:700;margin-top:.2rem}

.score-row{display:flex;gap:8px;justify-content:center;margin-bottom:.8rem;flex-wrap:wrap}
.score-pill{background:rgba(255,255,255,.08);border-radius:20px;padding:5px 16px;
  border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:7px}
.score-pill .label{font-size:.72rem;font-weight:800;color:rgba(255,255,255,.5);
  text-transform:uppercase;letter-spacing:.06em}
.score-pill .val{font-family:'Fredoka One',cursive;font-size:1.15rem;color:#fff}

/* ── JUNGLE FIELD ── */
.field{position:relative;width:100%;height:500px;border-radius:20px;overflow:hidden;
  cursor:pointer;border:3px solid rgba(168,224,99,.4);margin-bottom:.8rem}

/* layered sky + ground */
.field-sky{position:absolute;inset:0;
  background:linear-gradient(180deg,#87ceeb 0%,#b5e8a0 55%,#5a9e2f 55%,#3d7a1a 100%)}

/* sun */
.sun{position:absolute;top:6%;right:7%;width:55px;height:55px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#ffe066,#ffd000);
  box-shadow:0 0 0 8px rgba(255,208,0,.18),0 0 40px rgba(255,208,0,.45);
  animation:sun-glow 4s ease-in-out infinite;z-index:1}
@keyframes sun-glow{0%,100%{box-shadow:0 0 0 8px rgba(255,208,0,.18),0 0 40px rgba(255,208,0,.45)}
  50%{box-shadow:0 0 0 16px rgba(255,208,0,.22),0 0 70px rgba(255,208,0,.65)}}

/* clouds */
.cloud{position:absolute;border-radius:50px;background:rgba(255,255,255,.88);z-index:1}

/* trees */
.tree{position:absolute;z-index:2;display:flex;flex-direction:column;align-items:center}
.tree-top{border-radius:50% 50% 40% 40%;background:linear-gradient(180deg,#4caf50,#2e7d32)}
.tree-trunk{background:linear-gradient(90deg,#6d4c41,#8d6e63 50%,#6d4c41);border-radius:3px}

/* grass tufts along horizon */
.grass-row{position:absolute;left:0;right:0;z-index:3;pointer-events:none}
.tuft{position:absolute;bottom:0}

/* flowers */
.flower{position:absolute;z-index:2;font-size:1rem;pointer-events:none;
  animation:flower-sway 3s ease-in-out infinite}
@keyframes flower-sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

/* butterfly deco */
.butterfly{position:absolute;z-index:2;font-size:1.4rem;pointer-events:none;
  animation:flutter 2s ease-in-out infinite}
@keyframes flutter{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}

/* THE ANIMAL */
.animal{position:absolute;cursor:pointer;z-index:20;transition:transform .1s;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.4))}
.animal:hover{filter:drop-shadow(0 4px 16px rgba(255,215,0,.6)) drop-shadow(0 4px 8px rgba(0,0,0,.4))}

/* celebrate overlay */
.celebrate{display:none;position:absolute;top:0;left:0;width:100%;height:100%;
  align-items:center;justify-content:center;flex-direction:column;
  background:rgba(0,0,0,.55);border-radius:17px;z-index:30}
.celebrate.show{display:flex}
.cel-emoji{font-size:5rem;animation:bounce .45s infinite alternate;display:block;margin-bottom:.3rem}
@keyframes bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-14px) scale(1.12)}}
.cel-text{font-family:'Fredoka One',cursive;font-size:2rem;color:#FFD700;
  text-shadow:0 2px 14px rgba(0,0,0,.5);margin-bottom:.2rem;text-align:center;padding:0 1rem}
.cel-sub{font-size:1rem;color:rgba(255,255,255,.88);font-weight:800}

/* buttons */
.btn-row{text-align:center;margin-bottom:.9rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.start-btn{padding:.7rem 2.4rem;border-radius:40px;background:#388e3c;color:#fff;
  border:2px solid #a8e063;font-family:'Fredoka One',cursive;font-size:1.2rem;
  cursor:pointer;transition:opacity .15s}
.start-btn:hover{opacity:.88}
.next-btn{display:none;padding:.7rem 2rem;border-radius:40px;background:#FFD700;
  color:#0f2d00;border:none;font-family:'Fredoka One',cursive;font-size:1.1rem;cursor:pointer}
.next-btn:hover{opacity:.88}
.next-btn.show{display:block}

/* animal grid */
.animal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.animal-card{background:rgba(255,255,255,.07);border-radius:12px;
  border:1px solid rgba(255,255,255,.12);padding:.65rem;text-align:center;transition:all .2s}
.animal-card.caught{background:rgba(168,224,99,.15);border-color:#a8e063}
.ac-emoji{font-size:1.7rem;display:block;margin-bottom:3px}
.ac-name{font-family:'Fredoka One',cursive;font-size:.8rem;color:rgba(255,255,255,.5)}
.animal-card.caught .ac-name{color:#a8e063}
.ac-check{font-size:.75rem;color:#a8e063;font-weight:800;min-height:13px}

/* confetti */
.cf-dot{position:absolute;pointer-events:none;animation:cffall linear forwards;z-index:40}
@keyframes cffall{0%{opacity:1;transform:translateY(0) rotate(0)}
  100%{opacity:0;transform:translateY(220px) rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="game-title">🌿 Catch the <span>Wild Animal!</span></div>

  <div class="instruction">
    <div class="catch-text" id="catchText">🌿 Wild Animals!</div>
    <div class="catch-sub" id="catchSub">Press START to play!</div>
  </div>

  <div class="score-row">
    <div class="score-pill"><span class="label">Caught</span><span class="val" id="caughtCount">0</span></div>
    <div class="score-pill"><span class="label">Round</span><span class="val" id="roundNum">—</span></div>
    <div class="score-pill"><span class="label">Score</span><span class="val" id="scoreVal">0</span></div>
  </div>

  <div class="field" id="field">
    <!-- bg + deco injected by JS -->
    <div class="celebrate" id="celebrate">
      <span class="cel-emoji" id="celEmoji">⭐</span>
      <div class="cel-text" id="celText">Amazing!</div>
      <div class="cel-sub" id="celSub">You caught the lion!</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="start-btn" id="startBtn" onclick="startGame()">🎮 Start!</button>
    <button class="next-btn" id="nextBtn" onclick="nextRound()">Next Animal ➜</button>
  </div>

  <div class="animal-grid" id="animalGrid"></div>
</div>

<script>
// ─── ANIMALS ───────────────────────────────────────────
const ANIMALS=[
  {e:'🦁', name:'Lion',     color:'#f9a825', size:'4.5rem'},
  {e:'🐘', name:'Elephant', color:'#90a4ae', size:'4.8rem'},
  {e:'🦒', name:'Giraffe',  color:'#ffb300', size:'4.5rem'},
  {e:'🐆', name:'Leopard',  color:'#f57f17', size:'4rem'},
  {e:'🦓', name:'Zebra',    color:'#78909c', size:'4.2rem'},
  {e:'🦊', name:'Fox',      color:'#e64a19', size:'4rem'},
  {e:'🐺', name:'Wolf',     color:'#546e7a', size:'4rem'},
  {e:'🦏', name:'Rhino',    color:'#9e9e9e', size:'4.5rem'},
  {e:'🐻', name:'Bear',     color:'#795548', size:'4.5rem'},
  {e:'🦌', name:'Deer',     color:'#8d6e63', size:'4rem'},
];

const PRAISES=['Amazing!','Great job!','You got it!','Excellent!','Well done!','Fantastic!','Super!','Awesome!'];

// ─── STATE ─────────────────────────────────────────────
let order=[],curIdx=0,score=0,caughtCount=0;
let animalEl=null,moveInterval=null;
let ax=50,ay=40,vx=1.2,vy=0.9;
let roundActive=false;

// ─── AUDIO ─────────────────────────────────────────────
let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,d,t,g){try{const c=ac(),o=c.createOscillator(),gn=c.createGain();o.connect(gn);gn.connect(c.destination);o.type=t||'sine';o.frequency.value=f;gn.gain.setValueAtTime(g||.2,c.currentTime);gn.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playCatch(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.12,'triangle',.28),i*85));}
function playWin(){[523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>beep(f,.14,'triangle',.3),i*95));}

function speak(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=.87;u.pitch=1.1;
  const vs=speechSynthesis.getVoices();
  const v=vs.find(v=>/samantha|karen|victoria|google us/i.test(v.name))||vs.find(v=>v.lang.startsWith('en'));
  if(v)u.voice=v;
  setTimeout(()=>speechSynthesis.speak(u),80);
}

// ─── BUILD SCENE ────────────────────────────────────────
function buildScene(){
  const field=document.getElementById('field');
  field.querySelectorAll('.field-sky,.sun,.cloud,.tree,.grass-row,.flower,.butterfly').forEach(e=>e.remove());

  // sky + grass bg
  const sky=document.createElement('div');sky.className='field-sky';field.appendChild(sky);

  // sun
  const sun=document.createElement('div');sun.className='sun';field.appendChild(sun);

  // clouds
  [{l:'5%',t:'8%',w:110},{l:'32%',t:'5%',w:90},{l:'60%',t:'10%',w:130}].forEach(c=>{
    const d=document.createElement('div');d.className='cloud';
    d.style.cssText=`left:${c.l};top:${c.t};width:${c.w}px;height:${Math.round(c.w*.38)}px`;
    const p1=document.createElement('div');p1.style.cssText='position:absolute;top:-45%;left:12%;width:55%;height:85%;border-radius:50%;background:rgba(255,255,255,.88)';
    const p2=document.createElement('div');p2.style.cssText='position:absolute;top:-30%;left:38%;width:38%;height:70%;border-radius:50%;background:rgba(255,255,255,.88)';
    d.appendChild(p1);d.appendChild(p2);field.appendChild(d);
  });

  // trees
  [
    {l:'3%', h:110, tw:70, trunk:14},
    {l:'14%',h:90,  tw:58, trunk:12},
    {l:'78%',h:120, tw:76, trunk:16},
    {l:'88%',h:85,  tw:55, trunk:11},
    {l:'50%',h:75,  tw:50, trunk:10},
  ].forEach(t=>{
    const d=document.createElement('div');d.className='tree';
    d.style.cssText=`left:${t.l};bottom:${Math.round(t.h*.42)}px;`;
    const top=document.createElement('div');top.className='tree-top';
    top.style.cssText=`width:${t.tw}px;height:${t.h}px`;
    const trunk=document.createElement('div');trunk.className='tree-trunk';
    trunk.style.cssText=`width:${t.trunk}px;height:${Math.round(t.h*.42)}px`;
    d.appendChild(top);d.appendChild(trunk);field.appendChild(d);
  });

  // grass row at horizon
  const gr=document.createElement('div');gr.className='grass-row';
  gr.style.cssText='bottom:44%;left:0;right:0;height:28px;';
  for(let i=0;i<28;i++){
    const t=document.createElement('div');t.className='tuft';
    t.style.cssText=`left:${i*3.6+Math.random()*2}%;bottom:0`;
    t.innerHTML=`<svg width="${8+Math.random()*7}" height="${14+Math.random()*10}" viewBox="0 0 10 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M5,18 Q2,8 5,0 Q8,8 5,18Z" fill="#4caf50"/>
      <path d="M5,18 Q0,10 3,2 Q5,10 5,18Z" fill="#66bb6a" opacity=".7"/>
    </svg>`;
    gr.appendChild(t);
  }
  field.appendChild(gr);

  // flowers
  ['🌼','🌻','🌺','🌸','🌼','🌻'].forEach((f,i)=>{
    const d=document.createElement('div');d.className='flower';
    d.style.cssText=`left:${8+i*14+Math.random()*8}%;bottom:${40+Math.random()*8}%;animation-delay:${i*.4}s`;
    d.textContent=f;field.appendChild(d);
  });

  // butterflies
  ['🦋','🦋'].forEach((f,i)=>{
    const d=document.createElement('div');d.className='butterfly';
    d.style.cssText=`left:${20+i*45}%;top:${15+i*10}%;animation-delay:${i*.8}s`;
    d.textContent=f;field.appendChild(d);
  });
}

// ─── GRID ───────────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('animalGrid');g.innerHTML='';
  order.forEach((idx,i)=>{
    const a=ANIMALS[idx];
    g.innerHTML+=`<div class="animal-card" id="ac${i}">
      <span class="ac-emoji">${a.e}</span>
      <span class="ac-name">${a.name}</span>
      <div class="ac-check" id="ach${i}"></div>
    </div>`;
  });
}

// ─── GAME FLOW ──────────────────────────────────────────
function startGame(){
  order=[...Array(ANIMALS.length).keys()].sort(()=>Math.random()-.5);
  curIdx=0;score=0;caughtCount=0;
  document.getElementById('caughtCount').textContent=0;
  document.getElementById('scoreVal').textContent=0;
  buildGrid();
  document.getElementById('startBtn').style.display='none';
  buildScene();
  launchAnimal();
}

function launchAnimal(){
  clearInterval(moveInterval);
  const field=document.getElementById('field');
  if(animalEl){animalEl.remove();animalEl=null;}
  document.getElementById('celebrate').classList.remove('show');
  document.getElementById('nextBtn').classList.remove('show');

  if(curIdx>=order.length){showAllDone();return;}
  const a=ANIMALS[order[curIdx]];

  document.getElementById('roundNum').textContent=(curIdx+1)+'/'+order.length;
  document.getElementById('catchText').textContent='Catch the '+a.name+'! '+a.e;
  document.getElementById('catchSub').textContent='Tap the '+a.name+' as fast as you can!';
  speak('Catch the '+a.name+'!');

  roundActive=true;
  ax=15+Math.random()*65;ay=15+Math.random()*50;
  vx=(Math.random()>.5?1:-1)*(0.25+Math.random()*0.3);
  vy=(Math.random()>.5?1:-1)*(0.18+Math.random()*0.25);

  animalEl=document.createElement('div');
  animalEl.className='animal';
  animalEl.textContent=a.e;
  animalEl.style.fontSize=a.size;
  animalEl.style.left=ax+'%';
  animalEl.style.top=ay+'%';
  animalEl.style.lineHeight='1';
  animalEl.onclick=()=>caughtAnimal();
  field.appendChild(animalEl);

  moveInterval=setInterval(moveAnimal,30);
}

function moveAnimal(){
  if(!roundActive)return;
  ax+=vx;ay+=vy;
  if(ax<2||ax>88){vx*=-1;ax=Math.max(2,Math.min(88,ax));}
  if(ay<5||ay>78){vy*=-1;ay=Math.max(5,Math.min(78,ay));}
  if(animalEl){animalEl.style.left=ax+'%';animalEl.style.top=ay+'%';}
}

function caughtAnimal(){
  if(!roundActive)return;
  roundActive=false;
  clearInterval(moveInterval);
  const a=ANIMALS[order[curIdx]];
  score+=10;caughtCount++;
  document.getElementById('caughtCount').textContent=caughtCount;
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('ac'+curIdx).classList.add('caught');
  document.getElementById('ach'+curIdx).textContent='✓ caught!';

  const praise=PRAISES[Math.floor(Math.random()*PRAISES.length)];
  document.getElementById('celEmoji').textContent=a.e;
  document.getElementById('celText').textContent=praise;
  document.getElementById('celSub').textContent='You caught the '+a.name+'!';
  document.getElementById('celebrate').classList.add('show');

  playCatch();
  sprayConfetti();
  speak(praise+'! You caught the '+a.name+'!');

  if(animalEl){animalEl.style.transition='transform .25s';animalEl.style.transform='scale(1.5)';}
  document.getElementById('nextBtn').classList.add('show');
}

function nextRound(){curIdx++;launchAnimal();}

function showAllDone(){
  playWin();
  document.getElementById('catchText').textContent='🎉 All caught!';
  document.getElementById('catchSub').textContent='Amazing! Score: '+score;
  speak('Amazing! You caught all the wild animals!');
  sprayConfetti();setTimeout(sprayConfetti,700);setTimeout(sprayConfetti,1400);
  const sb=document.getElementById('startBtn');
  sb.textContent='🔄 Play Again!';
  sb.style.display='';
  sb.onclick=()=>startGame();
}

// ─── CONFETTI ───────────────────────────────────────────
function sprayConfetti(){
  const field=document.getElementById('field');
  const cols=['#FFD700','#a8e063','#f9a825','#ff6b35','#4cc9f0','#c77dff','#ff69b4','#fff'];
  for(let i=0;i<28;i++){
    const d=document.createElement('div');d.className='cf-dot';
    d.style.left=(10+Math.random()*80)+'%';
    d.style.top=(5+Math.random()*35)+'%';
    d.style.background=cols[~~(Math.random()*cols.length)];
    const sz=6+Math.random()*9;d.style.width=sz+'px';d.style.height=sz+'px';
    if(Math.random()>.5)d.style.borderRadius='50%';
    d.style.animationDuration=(.8+Math.random()*.9)+'s';
    d.style.animationDelay=(Math.random()*.3)+'s';
    field.appendChild(d);
    setTimeout(()=>d.remove(),1800);
  }
}

if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.addEventListener('voiceschanged',()=>{});}
</script>
</body>
</html>
